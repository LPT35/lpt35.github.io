<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="https://fav.farm/📊">
    <title>Lucie L. | Ingénieur Data & Dev</title>
    <style>
        :root {
            --bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card: rgba(255, 255, 255, 0.95);
            --text: #2d3436;
            --subtext: #636e72;
            --btn-bg: #ffffff;
            --btn-border: #e1e8ed;
            --primary: #6c5ce7;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --card: #1e1e1e;
                --text: #f4f7f6;
                --subtext: #a0a0a0;
                --btn-bg: #2d2d2d;
                --btn-border: #3d3d3d;
                --primary: #ff8a73; /* Saumon */
            }
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            background-attachment: fixed;
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2.5rem 1.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 85%;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 22px; 
            object-fit: cover;
            border: 3px solid var(--primary);
            margin-bottom: 1.2rem;
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        .badge {
            background: var(--primary);
            color: #fff;
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: 800;
            display: inline-block;
            margin-bottom: 1rem;
        }

        h1 { font-size: 1.8rem; margin: 0; letter-spacing: -0.5px; }
        .tagline { color: var(--subtext); font-size: 1rem; margin: 0.5rem 0 2rem 0; font-weight: 500; }

        .links { display: flex; flex-direction: column; gap: 1rem; }

        .btn {
            text-decoration: none;
            background: var(--btn-bg);
            color: var(--text);
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
            border: 1px solid var(--btn-border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .btn:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-github {
            display: none; 
            background: #000000 !important;
            color: #ffffff !important;
            border: none;
        }

        .footer { margin-top: 2.5rem; font-size: 0.8rem; color: var(--subtext); opacity: 0.8; }
        svg { flex-shrink: 0; color: var(--primary); }
    </style>
</head>
<body>
