<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Lucie L. | Portfolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        h1 { color: #2d3436; margin-bottom: 0.5rem; }
        p { color: #636e72; margin-bottom: 2rem; }
        .links { display: flex; flex-direction: column; gap: 1rem; }
        .btn {
            text-decoration: none;
            background-color: #0984e3;
            color: white;
            padding: 12px;
            border-radius: 8px;
            transition: transform 0.2s, background-color 0.2s;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #74b9ff;
            transform: translateY(-2px);
        }
        .btn-github { background-color: #2d3436; }
        .btn-github:hover { background-color: #4b4b4b; }
    </style>
</head>
<body>

<div class="container">
    <h1>Lucie L.</h1>
    <p>Bienvenue sur mon espace professionnel !</p>
    
    <div class="links">
        <a href="mon-cv.pdf" target="_blank" class="btn">📄 Mon CV (PDF)</a>
        <a href="dossier-competences.pdf" target="_blank" class="btn">📄 Dossier de Compétences</a>
        <a href="https://github.com/lpt35" target="_blank" class="btn btn-github">💻 Mon GitHub</a>
    </div>
</div>

</body>
</html>
